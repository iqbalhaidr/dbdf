services:
  postgresql:
    image: postgres:16
    container_name: postgresql
    ports:
      - "5432:5432"
    volumes:
      # Persist data
      - ./pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
  oracle:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle
    ports:
      - "1521:1521"
    volumes:
      # Persist data
      - oracle_data:/opt/oracle/oradata
      - ./oracle_setup.sql:/opt/oracle/scripts/startup/oracle_setup.sql
    environment:
      ORACLE_PWD: oracle

volumes:
  oracle_data:

