version: "3.8"

services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-xe-test
    environment:
      ORACLE_PASSWORD: TestPass123       # password untuk user SYS/SYSTEM
      APP_USER: testuser                 # user aplikasi yang otomatis dibuat
      APP_USER_PASSWORD: TestPass123
    ports:
      - "1521:1521"
    volumes:
      # SQL di sini otomatis dieksekusi sekali saat container pertama kali dibuat
      - ./init-scripts:/container-entrypoint-initdb.d
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: write-database-test
    depends_on:
      oracle-db:
        condition: service_healthy
    environment:
      # host "oracle-db" adalah nama service di network compose ini
      ORACLE_URI: "testuser/TestPass123@oracle-db:1521/XEPDB1"
    volumes:
      - .:/workspace
    working_dir: /workspace
    # Default: test suite kecil (append/replace/upsert/edge-cases).
    # Untuk uji skala besar, jalankan manual (lihat README):
    #   docker compose run --rm app python3 generate_test_data.py
    #   docker compose run --rm app python3 load_test_data_oracle.py
    command: ["python3", "test_write_database.py"]

volumes:
  oracle-data:
